name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android Platform 30
      run: |
        sdkmanager "platforms;android-30" "build-tools;30.0.3"

    - name: Install cargo-apk
      run: cargo install cargo-apk

    - name: Build APK (Debug)
      # 使用 tee 记录日志，既能实时看到输出，也能保存到文件
      run: |
        cargo apk build --lib 2>&1 | tee build.log
      continue-on-error: false

    - name: Upload Build Log on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: compilation-log
        path: build.log

    - name: Show Error Summary on Failure
      if: failure()
      # 打印最后 200 行，通常错误就在这里
      run: tail -n 200 build.log

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: water-reminder-apk
        path: target/debug/apk/water_reminder.apk
