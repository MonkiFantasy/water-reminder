name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android Platform 30
      run: |
        sdkmanager "platforms;android-30" "build-tools;30.0.3"

    - name: Install cargo-apk
      run: cargo install cargo-apk

    - name: Build APK (Debug)
      shell: bash
      run: |
        set -o pipefail
        # 记录完整日志
        cargo apk build --lib 2>&1 | tee build.log

    - name: Show Critical Errors on Failure
      if: failure()
      shell: bash
      run: |
        echo "=== [FIRST 50 LINES OF ERROR] ==="
        head -n 50 build.log
        echo ""
        echo "=== [CORE COMPILATION ERRORS] ==="
        # 提取包含 'error:' 或 'error[' 的行及其上下文
        grep -A 3 -E "error:|error\[" build.log | head -n 50
        echo ""
        echo "=== [SLINT COMPILER ERRORS] ==="
        grep -i "slint" build.log | head -n 20

    - name: Upload Full Build Log on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: full-compilation-log
        path: build.log

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: water-reminder-apk
        path: target/debug/apk/*.apk
