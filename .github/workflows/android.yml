name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android Platform 30
      run: |
        sdkmanager "platforms;android-30" "build-tools;30.0.3"

    - name: Install cargo-apk
      run: cargo install cargo-apk

    - name: Build APK (Debug)
      # 增加 pipefail 确保编译错误能被捕获
      shell: bash
      run: |
        set -o pipefail
        cargo apk build --lib 2>&1 | tee build.log

    - name: List files for debugging
      if: always()
      # 查看 target 目录结构，确认 APK 真实路径
      run: find target -name "*.apk"

    - name: Upload Build Log on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: compilation-log
        path: build.log

    - name: Show Error Summary on Failure
      if: failure()
      run: tail -n 300 build.log

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: water-reminder-apk
        path: target/debug/apk/*.apk
